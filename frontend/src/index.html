<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS Guard — Secure Domain Reputation Ledger</title>
  <meta name="description"
    content="Check domain reputation and history backed by blockchain integrity. Secure your DNS infrastructure with DNS Guard.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="index.css">
</head>

<body>
  <div class="container">
    <header style="position: relative;">
      <a href="admin.html"
        style="position: absolute; top: 0; right: 0; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 6px; transition: all 0.2s;">
        ⚙️ Admin
      </a>
      <h1>DNS Guard</h1>
      <p class="subtitle">Secure Blockchain-Backed Domain Reputation Ledger</p>
    </header>

    <main>
      <div class="search-box">
        <input type="text" id="domainInput" placeholder="Enter domain (e.g., example.com)" spellcheck="false"
          autocomplete="off">
        <button id="searchBtn" onclick="searchDomain()">Search</button>
      </div>

      <div id="analysisConsole" class="analysis-console">
        <div class="analysis-header">
          <span class="console-title">System Analysis Log</span>
          <span id="analysisStatus" style="font-size: 0.8rem; opacity: 0.7;">Active Scan...</span>
        </div>
        <div id="consoleLogs" class="console-logs">
          <!-- Logs will be streamed here -->
        </div>
        <div class="console-footer">DNS Guard Engine v2.4.0</div>
      </div>

      <div id="result">
        <!-- Data will be injected here -->
      </div>

      <button id="timelineBtn" class="secondary" onclick="loadTimeline()" style="display: none;">
        Explore Historical Timeline
      </button>

      <div id="timeline">
        <!-- Timeline will be injected here -->
      </div>
    </main>
  </div>


  <!-- Scripts -->
  <script src="search.js"></script>
</body>

</html>
